description: >-
  Sanofi is a French multinational pharmaceutical and healthcare company
  focused on immunology, oncology, rare diseases, and vaccines, and a leading
  vaccines manufacturer. Sanofi does not publish a public developer API.
  Its GitHub organization exists but has no public repositories. The company
  operates patient assistance and HCP portals as well as clinical trial
  information services that require authenticated access.
